<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - BirdTech Systems</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <header>
        <nav class="navbar">
            <div class="logo">BirdTech Systems</div>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#services">Services</a></li>
                <li><a href="index.html#projects">Projects</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div class="burger">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>
        </nav>
    </header>

    <!-- Contact Section -->
    <section class="contact">
        <h2>Get in Touch</h2>
        <p>Have a project in mind? Let's discuss how we can help you.</p>
        
        <div class="contact-methods">
            <a href="mailto:contact@birdtech.com" class="contact-btn email">
                <span class="icon">📧</span>
                <span class="label">Email</span>
            </a>
            <a href="https://wa.me/1234567890" class="contact-btn whatsapp" target="_blank">
                <span class="icon">💬</span>
                <span class="label">WhatsApp</span>
            </a>
            <a href="#contact-form" class="contact-btn form">
                <span class="icon">📝</span>
                <span class="label">Send Message</span>
            </a>
        </div>

        <form id="contact-form" class="contact-form">
            <div class="form-group">
                <input type="text" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <input type="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <input type="text" placeholder="Subject" required>
            </div>
            <div class="form-group">
                <input type="text" placeholder="What service are you interested in?" required>
            </div>
            <div class="form-group">
                <textarea placeholder="Your Message" rows="5" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 BirdTech Systems. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
